name: 🔒 Action pin check

permissions:
  contents: read

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - ".github/workflows/**"
      - "scripts/check-action-pins.py"
      - ".github/workflows/action-pin-ci.yml"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "scripts/check-action-pins.py"
  schedule:
    # Weekly liveness check — catches SHAs that were deleted after pinning.
    - cron: "0 9 * * 1"

concurrency:
  group: action-pin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-pins:
    name: "🔒 SHA pins — format + liveness"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: "Check all uses: lines are SHA-pinned and SHAs are still live"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/check-action-pins.py --workflows-dir .github/workflows
