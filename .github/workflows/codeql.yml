name: 🔐 CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    # Weekly scan on Monday at 03:17 UTC (staggered to avoid peak load)
    - cron: "17 3 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: go
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended

      - name: Prepare Go web embed stub
        if: matrix.language == 'go' && matrix.build-mode == 'autobuild'
        run: ./scripts/ensure-web-stub.sh
      - name: Autobuild
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@c8b1dcd6d6c4f1f1bb3c7a5f8d4e6f6b0a5b7c2d # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@97a4e71d54665c3e0f5f9efb58289f6a1ebf7af8 # v3
        with:
          category: "/language:${{ matrix.language }}"
