name: 🍎 macOS CI

on:
  # PRs run smoke validation for fast feedback.
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "tools/visualiser-macos/**"
      - "proto/velocity_visualiser/**"
      - "scripts/install-proto-tooling.sh"
      - "scripts/generate-protos.sh"
      - ".github/actions/setup-proto/**"
      - ".github/workflows/mac-ci.yml"

  # Tags and manual dispatch produce a versioned DMG artefact.
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  setup:
    name: "⚙️ Setup"
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup proto toolchain and generate Swift stubs
        uses: ./.github/actions/setup-proto
        with:
          generate: swift

      - name: Upload generated protos
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: generated-protos
          path: tools/visualiser-macos/VelocityVisualiser/gRPC/Generated/
          retention-days: 1

  format:
    name: "🔍 Format Check"
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install swift-format
        run: brew install swift-format

      - name: Check Swift formatting
        run: |
          cd tools/visualiser-macos
          swift-format lint --recursive Sources/ VelocityVisualiserTests/

  build-smoke:
    name: "🔨 Build (Smoke)"
    runs-on: macos-15
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download generated protos
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: generated-protos
          path: tools/visualiser-macos/VelocityVisualiser/gRPC/Generated/

      - name: Generate BuildInfo.swift
        run: |
          printf '// BuildInfo.swift\n// Auto-generated by CI. Do not edit manually.\n\nenum BuildInfo {\n    static let gitSHA = "%s"\n    static let buildTime = "%s"\n}\n' \
            "$(git rev-parse --short HEAD)" \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > tools/visualiser-macos/VelocityVisualiser/App/BuildInfo.swift

      - name: Build macOS visualiser
        run: |
          cd tools/visualiser-macos
          xcodebuild clean build \
            -scheme VelocityVisualiser \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  # Versioned DMG artefact — runs on tagged releases and manual dispatch.
  dmg:
    name: "📦 DMG"
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download generated protos
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: generated-protos
          path: tools/visualiser-macos/VelocityVisualiser/gRPC/Generated/

      - name: Generate BuildInfo.swift
        run: |
          printf '// BuildInfo.swift\n// Auto-generated by CI. Do not edit manually.\n\nenum BuildInfo {\n    static let gitSHA = "%s"\n    static let buildTime = "%s"\n}\n' \
            "$(git rev-parse --short HEAD)" \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > tools/visualiser-macos/VelocityVisualiser/App/BuildInfo.swift

      - name: Build Release app
        run: |
          cd tools/visualiser-macos
          xcodebuild \
            -project VelocityVisualiser.xcodeproj \
            -scheme VelocityVisualiser \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create versioned DMG
        run: make dmg-mac-release

      - name: Upload DMG artefact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: VelocityVisualiser-dmg
          path: tools/visualiser-macos/build/*VelocityVisualiser-*.dmg
          retention-days: 90
