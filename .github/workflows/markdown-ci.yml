name: 📝 Markdown CI

permissions:
  contents: read

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - "**/*.md"
      - "scripts/check-relative-links.py"
      - "scripts/check-backtick-paths.py"
      - ".github/workflows/markdown-ci.yml"
      - "Makefile"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "scripts/check-relative-links.py"
      - "scripts/check-backtick-paths.py"

concurrency:
  group: markdown-${{ github.ref }}
  cancel-in-progress: true

jobs:
  md-links:
    name: "🔗 Dead links and stale paths"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check relative Markdown links
        run: python3 scripts/check-relative-links.py

      - name: Check backtick-quoted paths
        run: python3 scripts/check-backtick-paths.py

      - name: Summary
        if: always()
        run: |
          echo "## 📝 Markdown Link Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Relative links" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          python3 scripts/check-relative-links.py --report >> $GITHUB_STEP_SUMMARY 2>&1 || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "### Backtick paths" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          python3 scripts/check-backtick-paths.py --report >> $GITHUB_STEP_SUMMARY 2>&1 || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Suppress known-stale references with \`<!-- link-ignore -->\`." >> $GITHUB_STEP_SUMMARY

  md-ascfix:
    name: "📐 Table and list formatting (ascfix)"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ascfix
        run: cargo install ascfix --version 0.7.1

      - name: Check Markdown tables and lists
        run: ascfix --check --mode safe -e .md . --summary

      - name: Summary
        if: always()
        run: |
          echo "## 📐 Markdown Table/List Check (ascfix)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ascfix --check --mode safe -e .md . --list-files >> $GITHUB_STEP_SUMMARY 2>&1 || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Fix with \`make format-docs\` or \`ascfix --in-place --mode safe -e .md .\`" >> $GITHUB_STEP_SUMMARY
