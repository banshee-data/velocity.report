name: ЁЯМЩ Nightly Full CI

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go-core-race:
    name: "ЁЯзк Go Core (race)"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: Build web stub for embed
        run: ./scripts/ensure-web-stub.sh

      - name: Run core tests with race detector
        run: |
          go test -race -tags=pcap \
            ./internal/db/... \
            ./internal/radar/... \
            ./internal/serialmux/... \
            ./internal/security/... \
            ./internal/units/... \
            ./internal/timeutil/... \
            ./internal/httputil/... \
            ./internal/testutil/... \
            ./internal/fsutil/... \
            ./internal/monitoring/... \
            ./cmd/velocity-ctl/...

  go-lidar-race:
    name: "ЁЯзк Go LiDAR (race)"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          lfs: true

      - name: Validate LFS files
        run: ./scripts/validate-lfs-files.sh

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install system dependencies (libpcap)
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Download Go modules
        run: go mod download

      - name: Build web stub for embed
        run: ./scripts/ensure-web-stub.sh

      - name: Run LiDAR tests with race detector
        run: |
          go test -race -tags=pcap -p 2 \
            ./internal/lidar/...

  go-integration-race:
    name: "ЁЯзк Go Integration (race)"
    runs-on: ubuntu-latest
    needs: [go-core-race, go-lidar-race]
    timeout-minutes: 90
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          lfs: true

      - name: Validate LFS files
        run: ./scripts/validate-lfs-files.sh

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install system dependencies (libpcap)
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Install TeX Live
        run: |
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended

      - name: Build minimal TeX tree
        run: make build-texlive-minimal

      - name: Setup pnpm and build web
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          cd web
          pnpm install
          pnpm run build

      - name: Run API integration tests with race detector
        env:
          VELOCITY_TEX_ROOT: ${{ github.workspace }}/build/texlive-minimal
        run: |
          go test -race -tags=pcap ./internal/api/...

  web-full:
    name: "ЁЯМР Web Full"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js with pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          working-directory: web

      - name: Run lint
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test:ci

      - name: Build production bundle
        run: pnpm run build

  docs-math-consistency:
    name: "ЁЯУЪ Docs + Math Consistency"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js with pnpm (docs)
        uses: ./.github/actions/setup-node-pnpm
        with:
          working-directory: public_html

      - name: Build docs
        run: make build-docs

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build web stub for embed
        run: ./scripts/ensure-web-stub.sh

      - name: Run schema consistency check
        run: go test ./internal/db -run '^TestSchemaConsistency$'

      - name: Run math-focused Go checks
        run: |
          go test ./internal/units/...
          go test -tags=pcap ./internal/api -run '^TestConvertEventAPISpeed$|^TestShowRadarObjectStats_CosineCorrection$'
          go test ./internal/db -run '^TestRadarObjectRollupRangeCosineCorrection$|^TestRadarDataRollupRangeCosineCorrection$'

  docs-link-health:
    name: "ЁЯФЧ Docs Link Health"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check relative Markdown links
        run: python3 scripts/check-relative-links.py

      - name: Check backtick-quoted paths
        run: python3 scripts/check-backtick-paths.py

  mac-setup:
    name: "ЁЯНО macOS Setup"
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cache grpc-swift plugin
        id: cache-grpc-swift
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: /tmp/protoc-gen-grpc-swift
          key: grpc-swift-protobuf-2.0.0-macos-15

      - name: Build grpc-swift plugin from source
        if: steps.cache-grpc-swift.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch 2.0.0 https://github.com/grpc/grpc-swift-protobuf.git /tmp/grpc-swift-protobuf
          cd /tmp/grpc-swift-protobuf
          swift build -c release --product protoc-gen-grpc-swift-2
          cp .build/release/protoc-gen-grpc-swift-2 /tmp/protoc-gen-grpc-swift

      - name: Upload grpc-swift plugin
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nightly-protoc-gen-grpc-swift-2
          path: /tmp/protoc-gen-grpc-swift
          retention-days: 1

      - name: Install protobuf tools
        run: brew install protobuf swift-protobuf

      - name: Install grpc-swift plugin
        run: sudo cp /tmp/protoc-gen-grpc-swift /usr/local/bin/protoc-gen-grpc-swift-2

      - name: Generate protobuf stubs
        run: make proto-gen-swift

      - name: Upload generated protos
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nightly-generated-protos
          path: tools/visualiser-macos/VelocityVisualiser/gRPC/Generated/
          retention-days: 1

  mac-format:
    name: "ЁЯНО macOS Format"
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install swift-format
        run: brew install swift-format

      - name: Check Swift formatting
        run: |
          cd tools/visualiser-macos
          swift-format lint --recursive Sources/ VelocityVisualiserTests/

  mac-build:
    name: "ЁЯНО macOS Build"
    runs-on: macos-15
    needs: mac-setup
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download generated protos
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: nightly-generated-protos
          path: tools/visualiser-macos/VelocityVisualiser/gRPC/Generated/

      - name: Generate BuildInfo.swift
        run: |
          printf '// BuildInfo.swift\n// Auto-generated by CI. Do not edit manually.\n\nenum BuildInfo {\n    static let gitSHA = "%s"\n    static let buildTime = "%s"\n}\n' \
            "$(git rev-parse --short HEAD)" \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > tools/visualiser-macos/VelocityVisualiser/App/BuildInfo.swift

      - name: Build macOS visualiser
        run: |
          cd tools/visualiser-macos
          xcodebuild clean build \
            -scheme VelocityVisualiser \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  mac-lint:
    name: "ЁЯНО macOS Lint"
    runs-on: macos-15
    needs: mac-setup
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download generated protos
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: nightly-generated-protos
          path: tools/visualiser-macos/VelocityVisualiser/gRPC/Generated/

      - name: Lint with SwiftLint (if configured)
        run: |
          if command -v swiftlint >/dev/null 2>&1; then
            cd tools/visualiser-macos
            swiftlint lint --strict
          else
            echo "SwiftLint not installed, skipping"
          fi

  mac-test:
    name: "ЁЯНО macOS Test"
    runs-on: macos-15
    needs: [mac-setup, mac-build]
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download generated protos
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: nightly-generated-protos
          path: tools/visualiser-macos/VelocityVisualiser/gRPC/Generated/

      - name: Generate BuildInfo.swift
        run: |
          printf '// BuildInfo.swift\n// Auto-generated by CI. Do not edit manually.\n\nenum BuildInfo {\n    static let gitSHA = "%s"\n    static let buildTime = "%s"\n}\n' \
            "$(git rev-parse --short HEAD)" \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > tools/visualiser-macos/VelocityVisualiser/App/BuildInfo.swift

      - name: Run tests with coverage
        run: |
          cd tools/visualiser-macos
          xcodebuild test \
            -scheme VelocityVisualiser \
            -destination 'platform=macOS' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Extract coverage report
        run: |
          cd tools/visualiser-macos
          xcrun xccov view --report --json TestResults.xcresult > coverage.json

      - name: Convert coverage to Codecov format
        run: |
          python3 scripts/xcode-coverage-to-lcov.py \
            tools/visualiser-macos/coverage.json \
            > tools/visualiser-macos/coverage.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@1e68e06f1dbfde0e4cefc87efeba9e4643565303 # v5.3.2
        with:
          files: ./tools/visualiser-macos/coverage.info
          flags: mac
          name: mac-coverage
          token: ${{ secrets.CODECOV_TOKEN }}

  performance-regression:
    name: "тЪб Performance Regression"
    runs-on: ubuntu-latest
    needs: go-lidar-race
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          lfs: true

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libpcap
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Build pcap-analyse
        run: go build -tags=pcap -o pcap-analyse ./cmd/tools/pcap-analyse

      - name: Run performance benchmark
        run: make test-perf
        continue-on-error: true

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nightly-benchmark-results
          path: |
            *_benchmark.json
            internal/lidar/perf/baseline/*.json
