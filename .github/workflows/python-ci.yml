name: 🐍 Python CI

# Limit the token permissions for security best practices
permissions:
  contents: write # Needed for python-coverage-comment-action to push branch
  pull-requests: write
  checks: write # Needed for coverage annotations
  issues: write # Needed for PR comments

on:
  # Run on PRs that touch the tools/ or data/ areas
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "tools/**"
      - "data/**"
      - ".github/workflows/python-ci.yml"
      - "requirements.txt"
      - "requirements.in"
      - "tox.ini"
  # Run on push to main to update coverage badges
  push:
    branches:
      - main
    paths:
      - "tools/**"
      - "data/**"
      - ".github/workflows/python-ci.yml"
      - "requirements.txt"
      - "requirements.in"
      - "tox.ini"

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: "🔍 Lint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        id: setup-python-lint
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Python venv
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        id: venv-cache
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ steps.setup-python-lint.outputs.python-version }}-${{ hashFiles('requirements.txt') }}

      - name: Setup Python environment
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Add venv to PATH
        run: echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      - name: Run repository formatter (make format-python)
        run: make format-python

  test:
    name: "🧪 Test"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        id: setup-python-test
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Python venv
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        id: venv-cache
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ steps.setup-python-test.outputs.python-version }}-${{ hashFiles('requirements.txt') }}

      - name: Setup Python environment
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Add venv to PATH
        run: echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      - name: Check LaTeX package parity
        run: python tools/pdf-generator/scripts/check_latex_package_parity.py

      - name: Run tests with coverage
        working-directory: tools/pdf-generator
        env:
          COVERAGE_FILE: .coverage
        run: |
          rm -f .coverage* coverage.xml htmlcov/*
          python -m pytest --cov=pdf_generator --cov-report=term-missing --cov-report=xml --cov-report=html -v

      - name: Upload Python coverage to Codecov
        uses: codecov/codecov-action@1e68e06f1dbfde0e4cefc87efeba9e4643565303 # v5.3.2
        with:
          files: ./tools/pdf-generator/coverage.xml
          flags: python
          name: python-coverage
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Coverage comment
        id: coverage_comment
        uses: py-cov-action/python-coverage-comment-action@e6ee17f632217eae267a13fbeb4389dce5dc4a26 # v3.27
        continue-on-error: true
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 90
          MINIMUM_ORANGE: 80
          ANNOTATE_MISSING_LINES: true
          ANNOTATION_TYPE: warning
          COVERAGE_PATH: tools/pdf-generator

      - name: Store Pull Request comment to be posted
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: steps.coverage_comment.outputs.COMMENT_FILE_WRITTEN == 'true'
        with:
          name: python-coverage-comment
          path: python-coverage-comment-action.txt
