name: SonarCloud

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  sonar:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set up Node.js with pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          working-directory: web

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build web stub for Go embed
        run: ./scripts/ensure-web-stub.sh

      - name: Run Go tests with coverage
        run: go test . ./cmd/... ./internal/... -coverprofile=coverage.out || true

      - name: Run web tests with coverage
        working-directory: web
        run: pnpm run test:ci || true

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
