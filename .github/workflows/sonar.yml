name: SonarCloud

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  sonar:
    runs-on: ubuntu-latest
    # Skip on fork PRs where SONAR_TOKEN is unavailable
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js with pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          working-directory: web

      - name: Install libpcap development headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev

      - name: Build web stub for Go embed
        run: ./scripts/ensure-web-stub.sh

      - name: Run Go tests with coverage
        continue-on-error: true
        run: go test -tags=pcap . ./cmd/... ./internal/... -coverprofile=coverage.out

      - name: Run web tests with coverage
        continue-on-error: true
        working-directory: web
        run: pnpm run test:ci

      - name: SonarCloud Scan
        if: always()
        uses: SonarSource/sonarqube-scan-action@v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
