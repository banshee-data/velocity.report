# Markdown formatting configuration for mdformat.
# Run: make format-docs
#
# Plugins: mdformat-gfm (tables, task lists, strikethrough),
#          mdformat-frontmatter (YAML frontmatter preservation).
#
# Scope: all .md files except public_html/ (Nunjucks templates).
# File paths are listed explicitly in the Makefile because the
# exclude option requires Python 3.13+.

wrap = 100
number = false
end_of_line = "lf"
validate = true
