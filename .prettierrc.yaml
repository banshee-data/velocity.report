# Root Prettier config — Markdown formatting only.
# Web-specific config (Svelte, Tailwind plugins) lives in web/.prettierrc.
#
# Prettier normalises Markdown structure (tables, lists, fences) with
# proseWrap=preserve, so paragraph line breaks are left as the author
# wrote them. Run: make format-docs.

overrides:
  - files: "*.md"
    options:
      proseWrap: preserve
      printWidth: 99
