coverage:
  status:
    project:
      default:
        target: 95%
        threshold: 1%
        informational: true
      radar-go:
        target: 98%
        threshold: 1%
        informational: true
        paths:
          - "internal/radar/**"
          - "internal/api/**"
          - "internal/db/**"
          - "internal/serialmux/**"
      lidar:
        target: 95%
        threshold: 1%
        informational: true
        paths:
          - "internal/lidar/**"
      svelte:
        target: 98%
        threshold: 1%
        informational: true
        paths:
          - "web/src/**"
    patch:
      default:
        target: 95%
        threshold: 1%
        informational: true

ignore:
  - "internal/lidar/visualiser/pb/**"

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: true

# Define coverage flags for each component
flag_management:
  default_rules:
    carryforward: true
    statuses:
      - type: project
        target: 95%
        threshold: 1%
        informational: true
      - type: patch
        target: 95%
        threshold: 1%
        informational: true
  individual_flags:
    - name: web
      carryforward: true
      paths:
        - "web/src/"
        - "internal/lidar/monitor/assets/"
      statuses:
        - type: project
          target: 98%
          threshold: 1%
          informational: true
        - type: patch
          target: 98%
          threshold: 1%
          informational: true

flags:
  go:
    paths:
      - internal/
    carryforward: true
  go-cli:
    paths:
      - cmd/
    carryforward: true
  python:
    paths:
      - tools/pdf-generator/
    carryforward: true
  web:
    paths:
      - web/src/
      - internal/lidar/monitor/assets/
    carryforward: true
  mac:
    paths:
      - tools/visualiser-macos/
    carryforward: true
