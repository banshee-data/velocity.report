# velocity-nginx.conf — nginx reverse proxy for velocity.report
#
# Terminates TLS on port 443 using the self-signed certificate generated
# by velocity-generate-tls.sh, and proxies all requests to the Go server
# on localhost:8080.
#
# The Go server remains directly accessible on port 8080 for local
# processes (e.g. PDF generator, diagnostics).

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name velocity.local;

    ssl_certificate     /var/lib/velocity-report/tls/server.crt;
    ssl_certificate_key /var/lib/velocity-report/tls/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Serve the CA certificate for browser trust installation
    location = /ca.crt {
        alias /var/lib/velocity-report/tls/ca.crt;
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="velocity-ca.crt"';
    }

    # Proxy everything else to the Go server
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (Server-Sent Events) support for /events
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name velocity.local;

    return 301 https://$host$request_uri;
}
