# LiDAR network interface — disabled by default
# Brought up only when LiDAR is enabled via the settings dashboard.
# Static IP for the LiDAR subnet (192.168.100.x).
#
# Uses allow-hotplug (not auto) so the interface is only configured
# when the hardware is present, and inet static so the address
# is actually applied.
allow-hotplug eth1
iface eth1 inet static
    address 192.168.100.1
    netmask 255.255.255.0
