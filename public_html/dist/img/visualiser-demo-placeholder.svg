  <g fill="#6b7280" opacity="0.3">
    <circle cx="200" cy="420" r="1.5" />
    <circle cx="600" cy="350" r="1.5" />
    <circle cx="700" cy="450" r="1.5" />
    <circle cx="250" cy="380" r="1" />
    <circle cx="650" cy="430" r="1" />
    <circle cx="380" cy="450" r="1.5" />
    <circle cx="580" cy="420" r="1" />
    <circle cx="420" cy="470" r="1.5" />
    <circle cx="300" cy="460" r="1" />
    <circle cx="500" cy="440" r="1.5" />
  </g>
  <!-- Sidebar panel hint -->
  <rect x="750" y="50" width="130" height="530" rx="4" fill="#252540" opacity="0.6" />
  <text x="815" y="75" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">Tracks</text>
  <line x1="760" y1="85" x2="870" y2="85" stroke="#4a5568" stroke-width="0.5" />
  <rect x="760" y="95" width="110" height="20" rx="3" fill="#10b981" opacity="0.15" />
  <text x="770" y="109" fill="#10b981" font-family="monospace" font-size="9">T12 · 28 mph</text>
  <rect x="760" y="120" width="110" height="20" rx="3" fill="#3b82f6" opacity="0.15" />
  <text x="770" y="134" fill="#3b82f6" font-family="monospace" font-size="9">T15 · 34 mph</text>
  <rect x="760" y="145" width="110" height="20" rx="3" fill="#f59e0b" opacity="0.15" />
  <text x="770" y="159" fill="#f59e0b" font-family="monospace" font-size="9">T18 · 22 mph</text>
