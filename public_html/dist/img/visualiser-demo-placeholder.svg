<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#533483;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="900" height="600" rx="12" fill="url(#bg)" />
  <!-- macOS title bar -->
  <rect width="900" height="32" rx="12" fill="#2d2d3d" />
  <rect x="0" y="16" width="900" height="16" fill="#2d2d3d" />
  <circle cx="20" cy="16" r="6" fill="#ff5f56" />
  <circle cx="40" cy="16" r="6" fill="#ffbd2e" />
  <circle cx="60" cy="16" r="6" fill="#27c93f" />
  <text x="450" y="21" text-anchor="middle" fill="#888" font-family="system-ui, -apple-system, sans-serif" font-size="13">VelocityVisualiser</text>
  <!-- Grid ground plane -->
  <g opacity="0.3" stroke="#4a5568" stroke-width="0.5">
    <line x1="100" y1="500" x2="800" y2="500" />
    <line x1="120" y1="480" x2="780" y2="480" />
    <line x1="140" y1="460" x2="760" y2="460" />
    <line x1="160" y1="440" x2="740" y2="440" />
    <line x1="180" y1="420" x2="720" y2="420" />
    <line x1="200" y1="400" x2="700" y2="400" />
    <line x1="250" y1="500" x2="350" y2="400" />
    <line x1="400" y1="500" x2="450" y2="400" />
    <line x1="550" y1="500" x2="500" y2="400" />
    <line x1="700" y1="500" x2="600" y2="400" />
  </g>
  <!-- Point cloud dots -->
  <g fill="#10b981" opacity="0.8">
    <circle cx="320" cy="350" r="2.5" />
    <circle cx="325" cy="345" r="2" />
    <circle cx="330" cy="348" r="3" />
    <circle cx="335" cy="342" r="2" />
    <circle cx="340" cy="346" r="2.5" />
    <circle cx="345" cy="340" r="2" />
    <circle cx="315" cy="355" r="2" />
    <circle cx="328" cy="352" r="2.5" />
    <circle cx="338" cy="350" r="2" />
    <circle cx="322" cy="340" r="1.5" />
  </g>
  <g fill="#3b82f6" opacity="0.8">
    <circle cx="520" cy="380" r="2.5" />
    <circle cx="525" cy="375" r="2" />
    <circle cx="530" cy="378" r="3" />
    <circle cx="535" cy="372" r="2" />
    <circle cx="540" cy="376" r="2.5" />
    <circle cx="518" cy="385" r="2" />
    <circle cx="528" cy="382" r="2.5" />
    <circle cx="538" cy="380" r="2" />
  </g>
  <g fill="#f59e0b" opacity="0.8">
    <circle cx="450" cy="300" r="2" />
    <circle cx="455" cy="295" r="2.5" />
    <circle cx="460" cy="298" r="2" />
    <circle cx="448" cy="305" r="2" />
    <circle cx="458" cy="302" r="2.5" />
    <circle cx="465" cy="296" r="2" />
  </g>
  <!-- Track bounding boxes -->
  <rect x="310" y="335" width="40" height="25" rx="2" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.7" />
  <rect x="510" y="368" width="35" height="22" rx="2" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.7" />
  <rect x="442" y="290" width="28" height="20" rx="2" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.7" />
  <!-- Track labels -->
  <text x="330" y="330" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="10">T12 · 28 mph</text>
  <text x="528" y="363" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="10">T15 · 34 mph</text>
  <text x="456" y="285" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="10">T18 · 22 mph</text>
  <!-- Track trails -->
  <path d="M330 347 L300 365 L270 380 L240 392" fill="none" stroke="#10b981" stroke-width="1" opacity="0.4" stroke-dasharray="4 2" />
  <path d="M528 379 L500 395 L472 408" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.4" stroke-dasharray="4 2" />
  <path d="M456 300 L440 320 L425 338" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.4" stroke-dasharray="4 2" />
