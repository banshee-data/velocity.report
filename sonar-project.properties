sonar.projectKey=banshee-data_velocity.report
sonar.organization=banshee-data

sonar.sources=.
sonar.sourceEncoding=UTF-8

sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.svelte-kit/**,**/coverage/**,**/*.min.js,tools/visualiser-macos/**

# Keep deprecated Python/static HTML included for now so we get a real baseline.
# We want the score to improve as those surfaces are removed later.
sonar.go.coverage.reportPaths=coverage.out
sonar.javascript.lcov.reportPaths=web/coverage/lcov.info
